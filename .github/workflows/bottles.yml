name: Bottles

on:
  push:
    branches: [main]
    paths: ['Formula/etr.rb']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bottle:
    # Skip bot commits to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[bottles]')"
    strategy:
      matrix:
        include:
          - os: macos-14          # ARM64 (Sonoma) — bottles work on Sonoma+
          - os: macos-15-intel    # Intel (Sequoia) — bottles work on Sequoia+
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Tap local repo
        run: |
          tap_dir="$(brew --repository)/Library/Taps/tkjaer/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sf "$GITHUB_WORKSPACE" "$tap_dir"

      - name: Get formula version
        id: formula
        run: |
          version=$(brew info --json=v2 tkjaer/tap/etr | jq -r '.formulae[0].versions.stable')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build bottle
        run: brew install --build-bottle tkjaer/tap/etr

      - name: Create bottle
        run: |
          brew bottle --json \
            --root-url="https://github.com/${{ github.repository }}/releases/download/v${{ steps.formula.outputs.version }}" \
            tkjaer/tap/etr
          ls -la *.bottle*

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v7
        with:
          name: bottle-${{ matrix.os }}
          path: |
            ${{ github.workspace }}/*.bottle*.tar.gz
            ${{ github.workspace }}/*.bottle.json

  publish:
    needs: bottle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Download all bottles
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Get formula version
        id: formula
        run: |
          version=$(grep -m1 'url ' Formula/etr.rb | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release and upload bottles
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.formula.outputs.version }}"
          gh release create "$tag" --title "etr $tag bottles" --notes "Homebrew bottles for etr $tag" 2>/dev/null || true
          # Rename double-dash to single-dash (brew bottle creates --, Homebrew downloads with -)
          for f in *.bottle*.tar.gz; do
            newname="${f/etr--/etr-}"
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done
          gh release upload "$tag" *.bottle*.tar.gz --clobber

      - name: Tap local repo
        run: |
          tap_dir="$(brew --repository)/Library/Taps/tkjaer/homebrew-tap"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sf "$GITHUB_WORKSPACE" "$tap_dir"

      - name: Update formula with bottle block
        run: brew bottle --merge --write --no-commit *.bottle.json

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
          git config http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${GH_TOKEN}" | base64)"
          git add Formula/etr.rb
          git diff --cached --quiet || {
            git commit -m "Update bottles for etr ${{ steps.formula.outputs.version }} [bottles]"
            git push origin main
          }
